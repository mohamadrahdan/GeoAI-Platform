name: CI Pipeline

## Robot wake up time
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Ubuntu GitHub Virtual Server

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13 # According to Python version
      uses: actions/setup-python@v5
      with:
        python-version: "3.13" 
        cache: 'pip'

    - name: Install dependencies
    # The requirements.txt file is required to run it
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8 black pytest pytest-cov

    - name: Check format with Black
      run: black --check .

    - name: Lint with Flake8
      run: flake8 .

    - name: Test with Pytest
      run: pytest tests/